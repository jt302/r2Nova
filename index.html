<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="R2Nova - Cloudflare R2 Desktop Client" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0b1326" />
    <title>R2Nova</title>

    <!-- Google Fonts: Manrope & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Prevent flash of unstyled content */
      html {
        background-color: #0b1326;
      }
      html.light {
        background-color: #ffffff;
      }

      /* Scrollbar styling for WebKit browsers */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #0b1326;
      }

      ::-webkit-scrollbar-thumb {
        background: #2d3449;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #3c4a5e;
      }
    </style>
  </head>
  <body class="bg-background text-on-surface font-body">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
